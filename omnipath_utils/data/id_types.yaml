# Unified registry of biological identifier types.
# Each top-level key is our canonical short name.
# Fields:
#   label          — human-readable name
#   entity_type    — protein | gene | transcript | small_molecule | mirna | probe
#   curie_prefix   — Bioregistry CURIE prefix (omitted when none known)
#   backends       — mapping to backend-specific column names
#   aliases        — alternative names that resolve to this type

# ===================================================================
# Protein identifiers
# ===================================================================

uniprot:
  label: UniProt AC
  entity_type: protein
  curie_prefix: uniprot
  backends:
    uniprot: accession
    uploadlists: UniProtKB
    uniprot_from: UniProtKB_AC-ID
    uniprot_to: UniProtKB
    ensembl: uniprotswissprot
    oma: null
    hmdb: uniprot_id
    ramp: uniprot
  aliases:
    - uniprot_ac
    - uniprotkb

swissprot:
  label: UniProt/SwissProt AC
  entity_type: protein
  curie_prefix: uniprot
  backends:
    uniprot: accession
    uploadlists: UniProtKB
    uniprot_from: UniProtKB_AC-ID
    uniprot_to: UniProtKB-Swiss-Prot
    ensembl: uniprotswissprot
    oma: UniProtKB/SwissProt
  aliases:
    - swiss_prot
    - uniprot_swissprot

trembl:
  label: UniProt/TrEMBL AC
  entity_type: protein
  curie_prefix: uniprot
  backends:
    uniprot: accession
    uploadlists: UniProtKB
    uniprot_from: UniProtKB_AC-ID
    uniprot_to: UniProtKB
    ensembl: uniprotsptrembl
    oma: UniProtKB/TrEMBL
  aliases:
    - uniprot_trembl
    - tr

uniprot_entry:
  label: UniProt entry name
  entity_type: protein
  curie_prefix: uniprot
  backends:
    uniprot: id
    uploadlists: UniProtKB
    uniprot_from: UniProtKB_AC-ID
    uniprot_to: UniProtKB
    oma: UniProtKB/SwissProt
  aliases:
    - uniprot_id
    - entry_name

uniprot-sec:
  label: UniProt secondary AC
  entity_type: protein
  curie_prefix: uniprot
  backends: {}
  aliases:
    - uniprot_sec
    - uniprot_secondary

uniprot-pri:
  label: UniProt primary AC
  entity_type: protein
  curie_prefix: uniprot
  backends: {}
  aliases:
    - uniprot_pri
    - uniprot_primary

protein_name:
  label: Protein name
  entity_type: protein
  backends:
    uniprot: protein_name
  aliases:
    - protein_names

refseqp:
  label: RefSeq protein
  entity_type: protein
  curie_prefix: refseq
  backends:
    uniprot: xref_refseq
    uploadlists: RefSeq_Protein
  aliases:
    - refseq_protein
    - refseq_prot

ncbiprotein:
  label: NCBI protein
  entity_type: protein
  curie_prefix: ncbiprotein
  backends:
    ramp: ncbiprotein
  aliases:
    - ncbi_protein

pir:
  label: PIR
  entity_type: protein
  backends:
    uniprot: xref_pir
    uploadlists: PIR
  aliases: []

pdb:
  label: PDB
  entity_type: protein
  curie_prefix: pdb
  backends:
